<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <title>IMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2c3e50">  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>  
  <script>
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-bs-theme', savedTheme);
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    :root { 
      --light-theme: #0d6efd; --dark-theme: #58a6ff; --brand-color: var(--light-theme);
      --light-bg: #f4f7f6; --light-card: #ffffff; --light-text: #212529;
      --dark-bg: #121212; --dark-card: #1e1e1e; --dark-text: #e0e0e0;
    }
    [data-bs-theme="dark"] { --brand-color: var(--dark-theme); }
    body { background-color: var(--light-bg); color: var(--light-text); font-family: sans-serif; -webkit-touch-callout: none; margin:0; padding:0; height: 100vh; overflow-x: hidden;}
    .hidden { display: none !important; }
    .text-primary { color: var(--brand-color) !important; }
    .bg-primary, .btn-primary { background-color: var(--brand-color) !important; border-color: var(--brand-color) !important; color: #fff !important; }
    .btn-outline-primary { color: var(--brand-color) !important; border-color: var(--brand-color) !important; }
    
    /* Overlays */
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--light-bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s ease; }
    [data-bs-theme="dark"] #loadingOverlay { background-color: var(--dark-bg); }    
    #gdprBanner { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10500; background: var(--light-bg); border-top: 1px solid rgba(0,0,0,0.1); box-shadow: 0 -4px 15px rgba(0,0,0,0.05); transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    [data-bs-theme="dark"] #gdprBanner { background: var(--dark-bg); border-top: 1px solid rgba(255,255,255,0.1); }
    #gdprBanner.visible { transform: translateY(0); }
    
    /* Modal absolute front fix */
    .modal-backdrop { z-index: 10550 !important; }
    .modal { z-index: 10600 !important; }
  </style>
</head>
<body>

<div id="loginOverlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light-bg); z-index: 10000; display: flex; align-items: center; justify-content: center;">
  <div class="card p-4 shadow-sm text-center" style="max-width: 400px; width: 90%; background: var(--light-card);">
    <img id="loginLogo" src="" alt="" style="width:300px; height:300px; object-fit:contain; margin: 0 auto; opacity: 0; transition: opacity 0.5s;" class="mb-3">
    <h3 id="loginTitle" class="fw-bold text-primary mb-3">Login</h3> 
    <p id="loginMessage" class="text-muted small mb-4 hidden"></p>       
    <div id="g_id_onload" data-context="signin" data-ux_mode="popup" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
    <div class="d-flex justify-content-center">
        <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="sign_in_with" data-size="large" data-logo_alignment="left"></div>
    </div>
  </div>
</div>

<div id="loadingOverlay">
  <img id="loadLogo" src="" alt="" style="width:300px; height:300px; object-fit:contain; opacity: 0; transition: opacity 0.5s;" class="mb-3">
  <h5 class="fw-bold text-secondary">Loading Secure Environment...</h5><br>
  <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
</div>

<div id="accessDenied" class="container py-5 text-center hidden">
  <div class="card p-5 shadow-sm mx-auto mt-5" style="max-width: 500px;">
    <h2 class="text-danger fw-bold mb-3">Access Denied</h2>
    <p class="text-muted" id="accessDeniedMsg">You do not have permission to view the IMS. Please contact an administrator to request access.</p>
    <p id="deniedEmail" class="fw-bold mt-3 text-secondary"></p>
  </div>
</div>

<div id="gdprBanner" class="p-3">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
    <div style="font-size: 0.85rem;" class="text-md-start text-center text-muted">
      <strong>We value your privacy.</strong> By continuing to use this application, you consent to our <a href="#" onclick="showLegalModal(event)" style="color: var(--brand-color); font-weight: bold; text-decoration: none;">Privacy Policy & Terms</a>.
    </div>
    <button class="btn btn-sm text-white fw-bold text-nowrap px-4" style="background-color: var(--brand-color);" onclick="acceptGDPR()">I Understand & Accept</button>
  </div>
</div>

<div class="modal fade" id="legalModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable modal-lg">
    <div class="modal-content bg-white" style="border-radius: 12px;">
      <div class="modal-header border-bottom">
        <h5 class="modal-title fw-bold text-primary">Terms & Privacy Policy</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-dark" style="font-size: 0.85rem; line-height: 1.6;" id="legalModalBody"></div>
      <div class="modal-footer border-top bg-light">
        <button type="button" class="btn btn-secondary fw-bold" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<div id="secureAppContainer"></div>

<script>
  // Global Shared Variables
  var db = { template: {} };
  var appCurrency = "$";
  var appDefaultImg = "";
  // IMPORTANT: REPLACE THE URL BELOW WITH YOUR NEW GOOGLE APPS SCRIPT WEB APP URL
  var GAS_URL = "https://script.google.com/macros/s/AKfycbwaSuyBWnqziZSdrIHCqNESBDAhciig8SSDxI3wh4nc2Fgb70koPRb7zfCWwlOu0Zf-Ew/exec";

  document.addEventListener("DOMContentLoaded", async function() {
    checkGDPR();
    try {
        const tConfig = await apiCall('getTemplateConfig');
        db.template = tConfig; // Saved for the privacy modal
        applyTemplateVars(tConfig);
    } catch(e) { console.warn("Failed to load pre-boot template."); }
    
    const savedEmail = localStorage.getItem('ims_user_email');
    if (savedEmail) bootApp(savedEmail);
    else {
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('loginOverlay').classList.remove('hidden');
    }
  });

  async function apiCall(actionName, payloadData = {}) {
    const email = localStorage.getItem('ims_user_email');
    if (!email && actionName !== 'getTemplateConfig') {
      document.getElementById('loginOverlay').classList.remove('hidden');
      throw new Error("Session expired. Please log in.");
    }
    const response = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: actionName, userEmail: email || 'public', ...payloadData })
    });
    const result = await response.json();
    if (result.error) throw new Error(result.error);
    return result.data;
  }

  function handleCredentialResponse(response) {
    const jwt = response.credential;
    const payload = JSON.parse(atob(jwt.split('.')[1]));
    localStorage.setItem('ims_user_email', payload.email);
    localStorage.setItem('ims_google_token', jwt);    
    bootApp(payload.email);
  }

  function signOut() {
    localStorage.removeItem('ims_user_email');
    localStorage.removeItem('ims_google_token');
    window.location.reload(); 
  }

  // --- THE MAGIC INJECTION FUNCTION ---
  async function bootApp(email) {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('loadingOverlay').classList.remove('hidden');
    document.getElementById('loadingOverlay').style.opacity = '1';
    
    try {
      // 1. Fetch the hidden HTML/CSS/JS payload from GAS
      const payloadHtml = await apiCall('getSecureApp');
      
      // 2. Load it into a temporary memory container
      const temp = document.createElement('div');
      temp.innerHTML = payloadHtml;
      
      // 3. Extract and apply the CSS
      const styles = temp.querySelectorAll('style');
      styles.forEach(s => document.head.appendChild(s));
      
      // 4. Extract the JS (Scripts won't run if just dropped via innerHTML)
      const scripts = temp.querySelectorAll('script');
      scripts.forEach(s => s.remove());
      
      // 5. Drop the Application HTML onto the page
      document.getElementById('secureAppContainer').innerHTML = temp.innerHTML;
      
      // 6. Execute the Javascript (This boots the app logic)
      scripts.forEach(script => {
        const newScript = document.createElement('script');
        newScript.textContent = script.textContent;
        document.body.appendChild(newScript);
      });

    } catch (err) {
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('accessDenied').classList.remove('hidden');
      document.getElementById('deniedEmail').innerText = err.message;
    }
  }

  function applyTemplateVars(t) {
      if (t.appTitle) {
          document.title = t.appTitle;
          const tText = document.getElementById('appTitleText');
          if (tText) tText.innerText = t.appTitle;
      }
      const useShort = (t.loginUseShortName && t.loginUseShortName.toLowerCase() === 'yes');
      const loginStr = (useShort && t.appShortName) ? t.appShortName : (t.appTitle || "IMS");
      document.getElementById('loginTitle').innerText = loginStr + " Login";

      const loginMsgEl = document.getElementById('loginMessage');
      if (t.loginMessage && t.loginMessage.trim() !== "") {
          loginMsgEl.innerText = t.loginMessage;
          loginMsgEl.classList.remove('hidden');
      }

      if (t.logoUrl) {
          ['loginLogo', 'loadLogo'].forEach(id => {
              const el = document.getElementById(id);
              if(el) { el.src = t.logoUrl; el.onload = () => el.style.opacity = '1'; }
          });
          let link = document.querySelector("link[rel~='icon']");
          if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
          link.href = t.logoUrl;
      }
      if (t.lightTheme) document.documentElement.style.setProperty('--light-theme', t.lightTheme);
      if (t.darkTheme) document.documentElement.style.setProperty('--dark-theme', t.darkTheme);
      const currentTheme = document.documentElement.getAttribute('data-bs-theme') || 'light';
      const activeColor = currentTheme === 'dark' ? (t.darkTheme || '#58a6ff') : (t.lightTheme || '#0d6efd');
      document.querySelector('meta[name="theme-color"]').setAttribute("content", activeColor);
      if (t.lightBg) document.documentElement.style.setProperty('--light-bg', t.lightBg);
      if (t.lightCard) document.documentElement.style.setProperty('--light-card', t.lightCard);
      if (t.lightText) document.documentElement.style.setProperty('--light-text', t.lightText);
      if (t.darkBg) document.documentElement.style.setProperty('--dark-bg', t.darkBg);
      if (t.darkCard) document.documentElement.style.setProperty('--dark-card', t.darkCard);
      if (t.darkText) document.documentElement.style.setProperty('--dark-text', t.darkText);
      if (t.currencySymbol) appCurrency = t.currencySymbol;
      if (t.defaultImgUrl) appDefaultImg = t.defaultImgUrl;
      if (t.adminContact) document.getElementById('accessDeniedMsg').innerText = `You do not have permission to view the IMS. Please contact ${t.adminContact} to request access.`;
      
      if (t.googleClientId) {
          const googleDiv = document.getElementById('g_id_onload');
          googleDiv.setAttribute('data-client_id', t.googleClientId);
          if (window.google && window.google.accounts) {
              window.google.accounts.id.initialize({ client_id: t.googleClientId, callback: handleCredentialResponse });
              window.google.accounts.id.renderButton(document.querySelector('.g_id_signin'), { theme: "outline", size: "large", type: "standard", shape: "rectangular", logo_alignment: "left" });
          }
      }
  }

  function checkGDPR() {
    if (!localStorage.getItem('ims_gdpr_consent')) {
      setTimeout(() => { document.getElementById('gdprBanner').classList.add('visible'); }, 1000);
    }
  }
  function acceptGDPR() {
    localStorage.setItem('ims_gdpr_consent', 'true');
    document.getElementById('gdprBanner').classList.remove('visible');
  }

  function showLegalModal(e) {
      if (e) e.preventDefault();      
      const t = db.template || {};
      const company = t.companyName || "The Company";
      const dev = t.developerName || "Jack Vu";
      const appName = t.appTitle || "Inventory Management System";
      const contact = t.adminContact || "your system administrator";
      const contactLink = t.adminContact ? `mailto:${t.adminContact}` : '#';
      
      document.getElementById('legalModalBody').innerHTML = `
        <h6 class="fw-bold" style="color: var(--brand-color);">1. Introduction & Acceptance</h6>
        <p>This Privacy Policy and Terms of Service govern the use of the ${appName} ("The Application"). By accessing, authenticating, or utilizing this system, you ("The User") agree to be bound by these terms in full.</p>
        <h6 class="fw-bold mt-4" style="color: var(--brand-color);">2. Intellectual Property & Ownership</h6>
        <p>The Application was independently architected, engineered, and developed by <span class="fw-bold">${dev}</span> on personal time. While the inventory data processed within The Application is the exclusive property of <span class="fw-bold">${company}</span>, the underlying architecture, logic, source code, and design patterns of The Application remain the sole intellectual property of <span class="fw-bold">${dev}</span>.</p>
        <h6 class="fw-bold mt-4" style="color: var(--brand-color);">3. Data Collection, Privacy, CCPA & GDPR Compliance</h6>
        <ul>
          <li><strong>Identity Data:</strong> We collect your email address exclusively via secure Google Workspace OAuth for system authentication and security auditing.</li>
          <li><strong>Activity Data:</strong> Interactions are permanently logged with your email and a timestamp to maintain a secure chain of custody.</li>
          <li><strong>Third-Party Sharing:</strong> Zero user or inventory data is sold, monetized, or shared with external third parties. All data is securely contained within <span class="fw-bold">${company}</span>'s infrastructure.</li>
        </ul>
        <h6 class="fw-bold mt-4" style="color: var(--brand-color);">4. Prohibited Data & Sensitive Information</h6>
        <p>Users are strictly prohibited from entering, uploading, or storing highly sensitive regulated data within any text field, note, or image upload. This includes: Protected Health Information (PHI), Personally Identifiable Information (PII) of minors, Social Security Numbers, or primary payment card details.</p>
        <h6 class="fw-bold mt-4" style="color: var(--brand-color);">5. Disclaimer of Warranties & Liability</h6>
        <p>The Application is provided strictly "AS IS". Under no circumstances shall <span class="fw-bold">${dev}</span> be held liable for any direct, indirect, incidental, consequential, or special damages arising out of or in connection with your use of The Application.</p>
        <h6 class="fw-bold mt-4" style="color: var(--brand-color);">6. Contact & Data Privacy Requests</h6>
        <p>If you wish to request a record of your data, report a vulnerability, or request the deletion of your user profile, please contact: <a href="${contactLink}" class="fw-bold" style="color: var(--brand-color);">${contact}</a>.</p>
      `;      
      const legalModal = new bootstrap.Modal(document.getElementById('legalModal'));
      legalModal.show();
  }
</script>
</script>
</body>
</html>
