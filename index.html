<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <title>IMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2c3e50">  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>  
  <script>
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-bs-theme', savedTheme);
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    :root { 
      --light-theme: #0d6efd; --dark-theme: #58a6ff; --brand-color: var(--light-theme);
      --light-bg: #f4f7f6; --light-card: #ffffff; --light-text: #212529;
      --dark-bg: #121212; --dark-card: #1e1e1e; --dark-text: #e0e0e0;
    }
    [data-bs-theme="dark"] { --brand-color: var(--dark-theme); }
    body { background-color: var(--light-bg); color: var(--light-text); font-family: sans-serif; -webkit-touch-callout: none; margin:0; padding:0; height: 100vh; overflow-x: hidden;}
    .hidden { display: none !important; }
    .text-primary { color: var(--brand-color) !important; }
    .bg-primary, .btn-primary { background-color: var(--brand-color) !important; border-color: var(--brand-color) !important; color: #fff !important; }
    .btn-outline-primary { color: var(--brand-color) !important; border-color: var(--brand-color) !important; }
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--light-bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s ease; }
    [data-bs-theme="dark"] #loadingOverlay { background-color: var(--dark-bg); }
    #gdprBanner { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10500; background: var(--light-bg); border-top: 1px solid rgba(0,0,0,0.1); box-shadow: 0 -4px 15px rgba(0,0,0,0.05); transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    [data-bs-theme="dark"] #gdprBanner { background: var(--dark-bg); border-top: 1px solid rgba(255,255,255,0.1); box-shadow: 0 -4px 15px rgba(0,0,0,0.3); }
    #gdprBanner.visible { transform: translateY(0); }
    [data-bs-theme="dark"] .gdpr-text { color: var(--dark-text) !important; }
    @keyframes pulseAlert { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    .animation-pulse { animation: pulseAlert 2s infinite; }
    .modal-backdrop { z-index: 10550 !important; }
    .modal { z-index: 10600 !important; }
  </style>
</head>
<body>
<div id="idleWarningOverlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10700; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(3px);">
  <div class="card p-4 shadow-lg text-center" style="max-width: 400px; width: 90%; background: var(--light-card); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;">
    <div class="mb-2" style="font-size: 3.5rem; line-height: 1;">⏳</div>
    <h4 class="fw-bold mb-3 text-primary">Inactivity Warning</h4>
    <p id="idleWarningText" class="mb-4 text-muted" style="font-size: 1rem;"></p>
    <button id="extendSessionBtn" class="btn btn-primary fw-bold w-100 py-3 fs-5" onclick="extendSession()">I'm still here</button>
  </div>
</div>
<div id="loginOverlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light-bg); z-index: 10000; display: flex; align-items: center; justify-content: center;">
  <div class="card p-4 shadow-sm text-center" style="max-width: 400px; width: 90%; background: var(--light-card); min-height: 400px; display: flex; flex-direction: column; justify-content: center;">    
    <div id="loginSpinner">
      <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
      <h5 class="fw-bold text-muted m-0">Connecting...</h5>
    </div>
    <div id="loginContent" class="hidden">
      <img id="loginLogo" src="" alt="" style="width:300px; height:300px; object-fit:contain; margin: 0 auto; opacity: 0; transition: opacity 0.5s;" class="mb-3">
      <h3 id="loginTitle" class="fw-bold text-primary mb-3">Login</h3> 
      <p id="loginMessage" class="text-muted small mb-4 hidden"></p>       
      <div class="d-flex justify-content-center" style="min-height: 44px;">
          <div id="googleSignInBtn"></div>
      </div>
    </div>
  </div>
</div>
<div id="loadingOverlay">
  <img id="loadLogo" src="" alt="" style="width:300px; height:300px; object-fit:contain; opacity: 0; transition: opacity 0.5s;" class="mb-3">
  <h5 class="fw-bold text-secondary">Loading Secure Environment...</h5><br>
  <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
</div>
<div id="accessDenied" class="container py-5 text-center hidden">
  <div class="card p-4 p-md-5 shadow-sm mx-auto mt-5 border-danger" style="max-width: 500px;">
    <h2 class="text-danger fw-bold mb-3">Access Denied</h2>
    <p class="text-muted" id="accessDeniedMsg">You do not have permission to view the IMS. Please contact an administrator to request access.</p>
    <p id="deniedEmail" class="fw-bold mt-3 mb-4 text-secondary"></p>
    <div class="border-top pt-4">
        <p class="small text-muted mb-2">Logged in with the wrong account?</p>
        <button class="btn btn-outline-primary fw-bold w-100" onclick="signOut()">Sign In Again</button>
    </div>
  </div>
</div>
<div id="legalContainer"></div>
<div id="secureAppContainer"></div>
<script>
  var db = { template: {} };
  var appCurrency = "$";
  var appDefaultImg = "";
  var appIdleTimeout = 15;
  var GAS_URL = "https://script.google.com/macros/s/AKfycbxRM7pblum2TVubgCvVQBRWF6FWKkHhtT-2pJuA8kCueVGo8izlXv6BCbNOQPzOH9PqCA/exec";
  document.addEventListener("DOMContentLoaded", function() {
    apiCall('getTemplateConfig').then(tConfig => {
        db.template = tConfig;
        applyTemplateVars(tConfig);
    }).catch(e => {
        console.error("🔥 CONFIG ERROR:", e.message);
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('loadingOverlay').classList.add('hidden');
        document.getElementById('accessDenied').classList.remove('hidden');
        document.getElementById('accessDeniedMsg').innerText = "System Configuration Error";
        document.getElementById('deniedEmail').innerText = e.message;
    });
    const savedEmail = localStorage.getItem('ims_user_email');
    if (savedEmail) {
        bootApp(savedEmail);
    } else {
        document.getElementById('loadingOverlay').classList.add('hidden');
        document.getElementById('loginOverlay').classList.remove('hidden');
    }
  });
  async function apiCall(actionName, payloadData = {}) {
    const email = localStorage.getItem('ims_user_email');
    if (!email && actionName !== 'getTemplateConfig') {
      document.getElementById('loginOverlay').classList.remove('hidden');
      throw new Error("Session expired. Please log in.");
    }
    const response = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: actionName, userEmail: email || 'public', userToken: localStorage.getItem('ims_google_token'), ...payloadData })
    });
    const result = await response.json();
    if (result.error) {
        if (result.error === "SESSION_EXPIRED") {
            localStorage.removeItem('ims_google_token');
            localStorage.removeItem('ims_user_email');
            window.location.reload();
            return;
        }
        throw new Error(result.error);
    }
    return result.data;
  }
  function handleCredentialResponse(response) {
    const jwt = response.credential;
    const payload = JSON.parse(atob(jwt.split('.')[1]));
    localStorage.setItem('ims_user_email', payload.email);
    localStorage.setItem('ims_google_token', jwt);    
    bootApp(payload.email);
  }
  function signOut() {
    localStorage.removeItem('ims_user_email');
    localStorage.removeItem('ims_google_token');
    window.location.reload(); 
  }
  let idleWarningTimer;
  let countdownInterval;
  let isIdleWarningActive = false;
  function extendSession() {
      isIdleWarningActive = false;
      const overlay = document.getElementById('idleWarningOverlay');
      if (overlay) overlay.classList.add('hidden');
      resetIdleTimer(); // Manually restart the background timers
  }
  function resetIdleTimer() {
      if (isIdleWarningActive) return;
      clearTimeout(idleWarningTimer);
      clearInterval(countdownInterval);
      if (localStorage.getItem('ims_google_token') && appIdleTimeout > 0) {
          let totalMs = appIdleTimeout * 60 * 1000;
          let warningMs = Math.min(2 * 60 * 1000, totalMs / 2); 
          let idleTimeBeforeWarning = totalMs - warningMs;
          idleWarningTimer = setTimeout(() => {
              showIdleWarning(warningMs, idleTimeBeforeWarning);
          }, idleTimeBeforeWarning);
      }
  }
  function showIdleWarning(warningMs, idleTimeBeforeWarning) {
      isIdleWarningActive = true;
      const overlay = document.getElementById('idleWarningOverlay');
      if (overlay) overlay.classList.remove('hidden');
      let timeLeft = Math.floor(warningMs / 1000);
      let idleMinutes = Math.floor(idleTimeBeforeWarning / 60000);
      if (idleMinutes < 1) idleMinutes = 1;
      const textEl = document.getElementById('idleWarningText');
      const updateText = () => {
          let min = Math.floor(timeLeft / 60);
          let sec = Math.floor(timeLeft % 60).toString().padStart(2, '0');
          if (textEl) {
              textEl.innerHTML = `You have been idle for over ${idleMinutes} minute${idleMinutes !== 1 ? 's' : ''}.<br><br>Your session will expire in <br><span class="text-danger fw-bold mt-2 d-block" style="font-size: 3rem;">${min}:${sec}</span>`;
          }
      };
      updateText();
      countdownInterval = setInterval(() => {
          timeLeft--;
          if (timeLeft <= 0) {
              clearInterval(countdownInterval);
              signOut(); // Time ran out, log them out
          } else {
              updateText();
          }
      }, 1000);
  }
  ['mousemove', 'keydown', 'scroll', 'touchstart', 'click'].forEach(evt => 
      document.addEventListener(evt, resetIdleTimer, true)
  );
  async function bootApp(email) {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('loadingOverlay').classList.remove('hidden');
    document.getElementById('loadingOverlay').style.opacity = '1';
    const lastHeartbeat = localStorage.getItem('ims_last_heartbeat');
    const today = new Date().toDateString();
    if (lastHeartbeat !== today) {
      apiCall('heartbeat').then(() => localStorage.setItem('ims_last_heartbeat', today)).catch(e => console.warn("Telemetry ping failed."));
    }
    try {
      const [encryptedPayload, initialData] = await Promise.all([
         apiCall('getSecureApp'),
         apiCall('getInitialData')
      ]);
      window._PRELOADED_DB = initialData;
      const scriptIdMatch = GAS_URL.match(/\/s\/([a-zA-Z0-9_-]+)/);
      const masterKey = scriptIdMatch ? scriptIdMatch[1] : GAS_URL;
      const decryptedHtml = decryptPayloadBytes(encryptedPayload, masterKey);
      const temp = document.createElement('div');
      temp.innerHTML = decryptedHtml;
      const styles = temp.querySelectorAll('style');
      styles.forEach(s => document.head.appendChild(s));
      const scripts = temp.querySelectorAll('script');
      scripts.forEach(s => s.remove());
      document.getElementById('secureAppContainer').innerHTML = temp.innerHTML;
      scripts.forEach((script) => {
        const newScript = document.createElement('script');
        newScript.text = script.text;
        try {
          document.body.appendChild(newScript);
        } catch (e) {
          console.error("🔥 JAVASCRIPT SYNTAX ERROR IN MOTHERSHIP PAYLOAD 🔥");
          console.error("The browser refused to execute the payload because of a typo.");
          console.error(e);
          console.log("------- COPY THE CODE BELOW TO FIND THE TYPO -------");
          console.log(script.text);
          document.getElementById('loadingOverlay').classList.add('hidden');
        }
      });
    } catch (err) {
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('accessDenied').classList.remove('hidden');
      document.getElementById('deniedEmail').innerText = err.message;
    }
  }
  function decryptPayloadBytes(base64Str, key) {
      const binaryStr = atob(base64Str);
      const keyBytes = new TextEncoder().encode(key);
      const decryptedBytes = new Uint8Array(binaryStr.length);
      for (let i = 0; i < binaryStr.length; i++) {
          decryptedBytes[i] = binaryStr.charCodeAt(i) ^ keyBytes[i % keyBytes.length];
      }
      return new TextDecoder().decode(decryptedBytes);
  }
  function applyTemplateVars(t) {
      const appTitle = t.appTitle || "IMS";
      document.title = appTitle;
      const tText = document.getElementById('appTitleText');
      if (tText) tText.innerText = appTitle;
      const useShort = ((t.loginUseShortName || "")).toLowerCase() === 'yes';
      const shortName = t.appShortName;
      const loginStr = (useShort && shortName) ? shortName : appTitle;
      document.getElementById('loginTitle').innerText = loginStr + " Login";
      const loginMsgEl = document.getElementById('loginMessage');
      if (t.loginMessage && t.loginMessage.trim() !== "") {
          loginMsgEl.innerText = t.loginMessage;
          loginMsgEl.classList.remove('hidden');
      } else {
          loginMsgEl.classList.add('hidden');
      }
      const logoUrl = t.logoUrl;
      if (logoUrl) {
          ['loginLogo', 'loadLogo', 'appLogo'].forEach(id => {
              const el = document.getElementById(id);
              if(el) { el.src = logoUrl; el.onload = () => el.style.opacity = '1'; }
          });
          let link = document.querySelector("link[rel~='icon']");
          if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
          link.href = logoUrl;
      }
      if (t.lightTheme) document.documentElement.style.setProperty('--light-theme', t.lightTheme);
      if (t.darkTheme) document.documentElement.style.setProperty('--dark-theme', t.darkTheme);
      const currentTheme = document.documentElement.getAttribute('data-bs-theme') || 'light';
      const activeColor = currentTheme === 'dark' ? (t.darkTheme || '#58a6ff') : (t.lightTheme || '#0d6efd');
      document.querySelector('meta[name="theme-color"]').setAttribute("content", activeColor);
      if (t.lightBg) document.documentElement.style.setProperty('--light-bg', t.lightBg);
      if (t.lightCard) document.documentElement.style.setProperty('--light-card', t.lightCard);
      if (t.lightText) document.documentElement.style.setProperty('--light-text', t.lightText);
      if (t.darkBg) document.documentElement.style.setProperty('--dark-bg', t.darkBg);
      if (t.darkCard) document.documentElement.style.setProperty('--dark-card', t.darkCard);
      if (t.darkText) document.documentElement.style.setProperty('--dark-text', t.darkText);
      appCurrency = t.currencySymbol || "$";
      appDefaultImg = t.defaultImgUrl || "";
      appIdleTimeout = parseInt(t.idleTimeout) || 15;
      const adminContact = t.adminContact || t._repEmail;
      if (adminContact) {
          const deniedMsg = document.getElementById('accessDeniedMsg');
          if (deniedMsg) deniedMsg.innerText = `You do not have permission to view the IMS. Please contact ${adminContact} to request access.`;
      }
      const sortCats = (str) => {
          let arr = str.split(',').map(s => s.trim()).filter(s => s);
          arr.sort((a,b) => a.localeCompare(b, undefined, {sensitivity: 'base'}));
          const otherIdx = arr.findIndex(x => x.toLowerCase() === 'other');
          if (otherIdx > -1) arr.push(arr.splice(otherIdx, 1)[0]); 
          return arr;
      };
      const mCat = document.getElementById('mCat');
      if (mCat && t.itemCategories) {
          mCat.innerHTML = '<option value="" disabled selected>Select Category</option>' + 
              sortCats(t.itemCategories).map(c => `<option value="${c}">${c}</option>`).join('');
      }
      const mLtype = document.getElementById('mLtype');
      if (mLtype && t.locationCategories) {
          mLtype.innerHTML = '<option value="" disabled selected>Select Category</option>' + 
              sortCats(t.locationCategories).map(c => `<option value="${c}">${c}</option>`).join('');
      }
      if (t.googleClientId) {
          if (window.google && window.google.accounts) {
              window.google.accounts.id.initialize({ client_id: t.googleClientId, callback: handleCredentialResponse });
              window.google.accounts.id.renderButton(document.getElementById('googleSignInBtn'), { theme: "outline", size: "large", type: "standard", shape: "rectangular", logo_alignment: "left" });
          }
      }
      const footerEl = document.getElementById('appFooterText');
      if (footerEl && t.footerText) footerEl.innerText = t.footerText;
      if (t.legalSystemHtml) {
          document.getElementById('legalContainer').innerHTML = t.legalSystemHtml;
          checkGDPR();
      }
      const spin = document.getElementById('loginSpinner');
      if (spin) spin.classList.add('hidden');
      const lCont = document.getElementById('loginContent');
      if (lCont) lCont.classList.remove('hidden');
  }
  function checkGDPR() {
    if (!localStorage.getItem('ims_gdpr_consent')) {
      setTimeout(() => { 
          const banner = document.getElementById('gdprBanner');
          if(banner) banner.classList.add('visible'); 
      }, 1000);
    }
  }
  function acceptGDPR() {
    localStorage.setItem('ims_gdpr_consent', 'true');
    const banner = document.getElementById('gdprBanner');
    if(banner) banner.classList.remove('visible');
  }
  function showLegalModal(e) {
      if (e) e.preventDefault();      
      const modalEl = document.getElementById('legalModal');
      if (!modalEl) return;
      const bodyEl = document.getElementById('legalModalBody');
      const btn1 = document.getElementById('legalCloseBtn');
      const btn2 = document.getElementById('legalCloseTop');
      const prompt = document.getElementById('legalScrollPrompt');
      btn1.disabled = true; btn2.disabled = true;
      btn1.className = "btn btn-secondary fw-bold";
      prompt.style.display = "inline-block";
      const unlockModal = () => {
          btn1.disabled = false; btn2.disabled = false;
          prompt.style.display = "none";
          btn1.classList.replace('btn-secondary', 'btn-success');
          btn1.innerText = "I Agree & Close";
      };
      bodyEl.onscroll = function() {
          if (bodyEl.scrollTop + bodyEl.clientHeight >= bodyEl.scrollHeight - 15) unlockModal();
      };
      setTimeout(() => {
          if (bodyEl.scrollHeight <= bodyEl.clientHeight + 10) unlockModal();
      }, 300);
      new bootstrap.Modal(modalEl).show();
  }
</script>
</body>
</html>
